  <rect x="40" y="40" width="813" height="194" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/><rect x="40" y="40" width="813" height="42" rx="8" fill="#dbeafe" stroke="#1f2937" stroke-width="2"/><text x="52" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Method</text><line x1="140" y1="40" x2="140" y2="234" stroke="#1f2937" stroke-width="2"/><text x="152" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Path</text><line x1="388" y1="40" x2="388" y2="234" stroke="#1f2937" stroke-width="2"/><text x="400" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Role</text><line x1="513" y1="40" x2="513" y2="234" stroke="#1f2937" stroke-width="2"/><text x="525" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Description</text><line x1="40" y1="82" x2="853" y2="82" stroke="#1f2937" stroke-width="2"/><rect x="40" y="82" width="813" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">GET</text><text x="152" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">/ping</text><text x="400" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">public</text><text x="525" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Auth health check.</text><line x1="40" y1="120" x2="853" y2="120" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="120" width="813" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">POST</text><text x="152" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">/auth/login</text><text x="400" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">public</text><text x="525" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Exchanges email/password for a JWT.</text><line x1="40" y1="158" x2="853" y2="158" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="158" width="813" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">GET</text><text x="152" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">/auth/me</text><text x="400" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">authenticated</text><text x="525" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Returns the current token subject, email, and role.</text><line x1="40" y1="196" x2="853" y2="196" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="196" width="813" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">POST</text><text x="152" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">/auth/password-reset-requests</text><text x="400" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">public</text><text x="525" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Enqueues password_reset.requested if the email exists. Always returns 202.</text>
