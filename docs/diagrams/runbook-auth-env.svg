  <rect x="40" y="40" width="762" height="422" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/><rect x="40" y="40" width="762" height="42" rx="8" fill="#dbeafe" stroke="#1f2937" stroke-width="2"/><text x="52" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Variable</text><line x1="180" y1="40" x2="180" y2="462" stroke="#1f2937" stroke-width="2"/><text x="192" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Default</text><line x1="482" y1="40" x2="482" y2="462" stroke="#1f2937" stroke-width="2"/><text x="494" y="66" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="15" fill="#111827">Purpose</text><line x1="40" y1="82" x2="802" y2="82" stroke="#1f2937" stroke-width="2"/><rect x="40" y="82" width="762" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">PORT</text><text x="192" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">8081</text><text x="494" y="104" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">HTTP server port.</text><line x1="40" y1="120" x2="802" y2="120" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="120" width="762" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">AUTH_DB_URL</text><text x="192" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">local Postgres DSN</text><text x="494" y="142" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Auth database connection.</text><line x1="40" y1="158" x2="802" y2="158" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="158" width="762" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">RABBITMQ_URL</text><text x="192" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">amqp://guest:guest@rabbitmq:5672/</text><text x="494" y="180" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">RabbitMQ connection for auth outbox dispatch.</text><line x1="40" y1="196" x2="802" y2="196" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="196" width="762" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">API_DOMAIN</text><text x="192" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">http://localhost</text><text x="494" y="218" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Order API origin allowed by CORS.</text><line x1="40" y1="234" x2="802" y2="234" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="234" width="762" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="256" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">AUTH_API_DOMAIN</text><text x="192" y="256" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">http://localhost</text><text x="494" y="256" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Auth API origin allowed by CORS.</text><line x1="40" y1="272" x2="802" y2="272" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="272" width="762" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="294" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">WEBSITE_DOMAIN</text><text x="192" y="294" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">http://localhost</text><text x="494" y="294" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Frontend origin allowed by CORS.</text><line x1="40" y1="310" x2="802" y2="310" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="310" width="762" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">JWT_SECRET</text><text x="192" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">coffee-service-local-jwt-secret</text><text x="494" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">HMAC secret for signed bearer tokens.</text><line x1="40" y1="348" x2="802" y2="348" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="348" width="762" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="370" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">JWT_ISSUER</text><text x="192" y="370" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">coffee-service</text><text x="494" y="370" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">JWT issuer claim value.</text><line x1="40" y1="386" x2="802" y2="386" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="386" width="762" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="408" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">JWT_TTL_MINUTES</text><text x="192" y="408" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">480</text><text x="494" y="408" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Token lifetime in minutes.</text><line x1="40" y1="424" x2="802" y2="424" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="424" width="762" height="38" fill="#f9fafb" opacity="0.9"/><text x="52" y="446" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">AUTH_DEMO_USERS</text><text x="192" y="446" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">built-in user/barista/admin accounts</text><text x="494" y="446" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Comma-separated email:password:role entries.</text>
