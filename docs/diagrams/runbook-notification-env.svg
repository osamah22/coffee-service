Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Sender address.</text><line x1="40" y1="310" x2="894" y2="310" stroke="#1f2937" stroke-width="1.5"/><rect x="40" y="310" width="854" height="38" fill="#ffffff" opacity="0.9"/><text x="52" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">NOTIFICATION_FALLBACK_EMAIL</text><text x="284" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">dev@coffee.local</text><text x="586" y="332" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="14" fill="#111827">Fallback when an event has no customer email.</text>
