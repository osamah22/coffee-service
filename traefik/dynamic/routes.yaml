http:
  routers:
    frontend:
      entryPoints:
        - web
      rule: "Host(`localhost`) && PathPrefix(`/`)"
      priority: 1
      service: frontend

    auth-service:
      entryPoints:
        - web
      rule: "Host(`localhost`) && PathPrefix(`/auth`)"
      priority: 100
      service: auth-service

    order-service:
      entryPoints:
        - web
      rule: "Host(`localhost`) && PathPrefix(`/api`)"
      priority: 90
      middlewares:
        - api-strip
      service: order-service

  middlewares:
    api-strip:
      stripPrefix:
        prefixes:
          - /api

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

    order-service:
      loadBalancer:
        servers:
          - url: "http://order-service:8080"

    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8081"
