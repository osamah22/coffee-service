name: coffee-service

services:
  postgres:
    image: postgres:16
    container_name: order-service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee
    network_mode: host
    volumes:
      - order_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: order-service_rabbitmq
    network_mode: host
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: order-service_mailhog
    network_mode: host

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
      network: host
    container_name: order-service_api
    environment:
      PORT: "8080"
      DB_URL: postgres://postgres:postgres@localhost:5432/coffee?sslmode=disable
      API_DOMAIN: http://localhost:8080
      AUTH_API_DOMAIN: http://localhost:8081
      WEBSITE_DOMAIN: http://localhost
      JWT_SECRET: coffee-service-local-jwt-secret
      JWT_ISSUER: coffee-service
      JWT_TTL_MINUTES: "480"
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    network_mode: host

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      network: host
    container_name: coffee-service_auth
    environment:
      PORT: "8081"
      AUTH_DB_URL: postgres://postgres:postgres@localhost:5432/coffee?sslmode=disable
      API_DOMAIN: http://localhost:8080
      AUTH_API_DOMAIN: http://localhost:8081
      WEBSITE_DOMAIN: http://localhost
      JWT_SECRET: coffee-service-local-jwt-secret
      JWT_ISSUER: coffee-service
      JWT_TTL_MINUTES: "480"
      AUTH_DEMO_USERS: customer@example.com:customer123:user,barista@coffee.local:barista123:barista,admin@coffee.local:admin123:admin
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    network_mode: host

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      network: host
    container_name: order-service_notifications
    environment:
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_FROM: Coffee Service <orders@coffee.local>
      NOTIFICATION_FALLBACK_EMAIL: dev@coffee.local
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    network_mode: host

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
      args:
        VITE_API_URL: http://localhost:8080
        VITE_AUTH_API_URL: http://localhost:8081
    container_name: order-service_frontend
    depends_on:
      order-service:
        condition: service_started
      auth-service:
        condition: service_started
    network_mode: host

volumes:
  order_service_postgres_data:
    name: order-service_postgres_data
