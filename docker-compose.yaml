name: coffee-service

services:
  traefik:
    image: traefik:v3.1
    container_name: coffee-service_gateway
    command:
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/dynamic/routes.yaml
      - --providers.file.watch=true
    ports:
      - "80:80"
    volumes:
      - ./traefik/dynamic/routes.yaml:/etc/traefik/dynamic/routes.yaml:ro
    depends_on:
      frontend:
        condition: service_started
      order-service:
        condition: service_started
      auth-service:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: order-service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee
    ports:
      - "5432:5432"
    volumes:
      - order_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: order-service_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: order-service_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
      network: host
    container_name: order-service_api
    environment:
      PORT: "8080"
      DB_URL: postgres://postgres:postgres@postgres:5432/coffee?sslmode=disable
      API_DOMAIN: http://localhost
      AUTH_API_DOMAIN: http://localhost
      WEBSITE_DOMAIN: http://localhost
      JWT_SECRET: coffee-service-local-jwt-secret
      JWT_ISSUER: coffee-service
      JWT_TTL_MINUTES: "480"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      network: host
    container_name: coffee-service_auth
    environment:
      PORT: "8081"
      AUTH_DB_URL: postgres://postgres:postgres@postgres:5432/coffee?sslmode=disable
      API_DOMAIN: http://localhost
      AUTH_API_DOMAIN: http://localhost
      WEBSITE_DOMAIN: http://localhost
      JWT_SECRET: coffee-service-local-jwt-secret
      JWT_ISSUER: coffee-service
      JWT_TTL_MINUTES: "480"
      AUTH_DEMO_USERS: customer@example.com:customer123:user,barista@coffee.local:barista123:barista,admin@coffee.local:admin123:admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      network: host
    container_name: order-service_notifications
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: Coffee Service <orders@coffee.local>
      NOTIFICATION_FALLBACK_EMAIL: dev@coffee.local
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
      args:
        VITE_API_URL: http://localhost/api
        VITE_AUTH_API_URL: http://localhost
    container_name: order-service_frontend
    depends_on:
      order-service:
        condition: service_started
      auth-service:
        condition: service_started

volumes:
  order_service_postgres_data:
    name: order-service_postgres_data
