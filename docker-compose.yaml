name: order-service

services:
  postgres:
    image: postgres:16
    container_name: order-service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee
    network_mode: host
    volumes:
      - order_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee"]
      interval: 5s
      timeout: 5s
      retries: 10

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql
    container_name: order-service_supertokens
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:postgres@localhost:5432/coffee
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
      network: host
    container_name: order-service_api
    environment:
      PORT: "8080"
      DB_URL: postgres://postgres:postgres@localhost:5432/coffee?sslmode=disable
      SUPERTOKENS_CONNECTION_URI: http://localhost:3567
      SUPERTOKENS_APP_NAME: Coffee Service
      SUPERTOKENS_API_DOMAIN: http://localhost:8080
      SUPERTOKENS_WEBSITE_DOMAIN: http://localhost
      SUPERTOKENS_API_BASE_PATH: /auth
      SUPERTOKENS_WEBSITE_BASE_PATH: /auth
      SUPERTOKENS_ADMIN_EMAILS: admin@example.com
      AUTH_GUEST_RPS: "10"
      AUTH_ADMIN_RPS: "1000"
      AUTH_USER_RPS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      supertokens:
        condition: service_started
    network_mode: host

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
      args:
        VITE_API_URL: http://localhost:8080
    container_name: order-service_frontend
    depends_on:
      order-service:
        condition: service_started
    network_mode: host

volumes:
  order_service_postgres_data:
    name: order-service_postgres_data
