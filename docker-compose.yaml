name: order-service

services:
  traefik:
    image: traefik:v3.2
    container_name: order-service_traefik
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - order_service_network

  postgres:
    image: postgres:16
    container_name: order-service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee
    ports:
      - "5432:5432"
    volumes:
      - order_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - order_service_network

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service_api
    environment:
      PORT: "8080"
      DB_URL: postgres://postgres:postgres@postgres:5432/coffee?sslmode=disable
      AUTH_ENABLED: "true"
      AUTH_ISSUER: http://localhost/api/auth
      AUTH_AUDIENCE: order-service
      AUTH_JWT_SECRET: order-service-dev-jwt-secret-change-me
      AUTH_ROLE_CLAIM: groups
      AUTH_ADMIN_ROLES: admin,admins,order-service-admin
      AUTH_USER_ROLES: user,users,order-service-user
      AUTH_GUEST_RPS: "10"
      AUTH_ADMIN_RPS: "1000"
      AUTH_USER_RPS: "10"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - order_service_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost/api
    container_name: order-service_frontend
    depends_on:
      order-service:
        condition: service_started
    networks:
      - order_service_network

networks:
  order_service_network:
    name: order-service_network
    driver: bridge

volumes:
  order_service_postgres_data:
    name: order-service_postgres_data
